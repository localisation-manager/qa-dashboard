name: Sync Notion data & deploy dashboard

on:
  schedule:
    # Every day at 07:00 UTC (~08:00 CET / ~09:00 CEST). Adjust as needed.
    - cron: "0 7 * * *"
  workflow_dispatch: {}  # also runnable on-demand from the Actions tab
  push:
    branches: [main]
    paths:
      - "index.html"
      - "data/data.json"
      - ".github/workflows/sync.yml"

permissions:
  contents: write   # needed to commit updated data.json back to the repo
  pages: write      # needed to publish the dashboard to GitHub Pages
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    name: Pull latest data from Notion
    runs-on: ubuntu-latest
    # Skip the sync step for push-triggered runs (no data change needed)
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync_notion.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/sync_notion.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/data.json; then
            echo "No data changes."
          else
            git add data/data.json
            git commit -m "chore: refresh Notion data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [sync]
    # Always run deploy so that push events (which skip sync) still publish
    if: always() && !cancelled()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # If sync just pushed a new commit, pull it before uploading
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root (index.html + data/ directory)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
